<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Fútbol Data</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap');

  :root {
    --neon-green: #00ff88;
    --neon-blue: #00cfff;
    --neon-yellow: #ffe600;
    --neon-red: #ff4d6d;
    --dark: #050a0e;
    --dark2: #0a1628;
    --dark3: #0f2040;
    --card-bg: rgba(0, 255, 136, 0.04);
    --card-border: rgba(0, 255, 136, 0.15);
    --text: #e8f4f8;
    --muted: #6b8fa8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 700px;
    background: radial-gradient(ellipse, rgba(0,255,136,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: spotlightPulse 4s ease-in-out infinite;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(0,207,255,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  @keyframes spotlightPulse {
    0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
    50% { opacity: 0.6; transform: translateX(-50%) scale(1.1); }
  }

  .stadium-lines {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; opacity: 0.03;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 60px, #00ff88 60px, #00ff88 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, #00ff88 60px, #00ff88 61px);
  }

  .ball-container {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }

  .floating-ball {
    position: absolute; font-size: 2rem;
    animation: floatBall 8s ease-in-out infinite; opacity: 0.12;
  }

  .floating-ball:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; font-size: 1.5rem; }
  .floating-ball:nth-child(2) { top: 60%; left: 90%; animation-delay: -3s; font-size: 2.5rem; }
  .floating-ball:nth-child(3) { top: 80%; left: 15%; animation-delay: -5s; font-size: 1rem; }
  .floating-ball:nth-child(4) { top: 30%; left: 80%; animation-delay: -2s; font-size: 1.8rem; }

  @keyframes floatBall {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    25% { transform: translateY(-30px) rotate(90deg); }
    50% { transform: translateY(-15px) rotate(180deg); }
    75% { transform: translateY(-40px) rotate(270deg); }
  }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 760px; margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .header { text-align: center; margin-bottom: 48px; }

  .header-badge {
    display: inline-block;
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--neon-green);
    border: 1px solid rgba(0,255,136,0.3);
    padding: 6px 16px; border-radius: 100px; margin-bottom: 20px;
    animation: badgePulse 2s ease-in-out infinite;
  }

  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.3); }
    50% { box-shadow: 0 0 20px 4px rgba(0,255,136,0.15); }
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    line-height: 0.9; letter-spacing: 0.02em;
    background: linear-gradient(135deg, #ffffff 0%, var(--neon-green) 50%, var(--neon-blue) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 12px;
    animation: titleGlow 3s ease-in-out infinite;
  }

  @keyframes titleGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,255,136,0.3)); }
    50% { filter: drop-shadow(0 0 40px rgba(0,255,136,0.6)); }
  }

  .header p { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.05em; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px; padding: 28px; margin-bottom: 24px;
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }

  .card:hover {
    transform: translateY(-4px) perspective(800px) rotateX(1deg);
    box-shadow: 0 20px 60px rgba(0,255,136,0.1);
    border-color: rgba(0,255,136,0.4);
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 0.08em;
    color: var(--neon-green); margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }

  .card-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(0,255,136,0.3), transparent);
  }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 12px 16px;
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 0.95rem; outline: none;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
  }

  .form-group input:focus {
    border-color: var(--neon-green);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
    background: rgba(0,255,136,0.05);
  }

  .form-group input::placeholder { color: rgba(255,255,255,0.2); }

  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--neon-green), #00cc6e);
    color: #050a0e; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 0.12em;
    border: none; border-radius: 10px; cursor: pointer;
    margin-top: 8px; transition: transform 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }

  .btn::before {
    content: ''; position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.4s;
  }

  .btn:hover::before { left: 100%; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,255,136,0.4); }
  .btn:active { transform: translateY(0); }

  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }

  thead tr {
    background: linear-gradient(90deg, rgba(0,255,136,0.15), rgba(0,207,255,0.1));
  }

  th {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem; letter-spacing: 0.15em;
    color: var(--neon-green); padding: 14px 12px;
    text-align: left; border-bottom: 1px solid rgba(0,255,136,0.2);
  }

  td {
    padding: 12px 12px; font-size: 0.9rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s;
  }

  tr:hover td { background: rgba(0,255,136,0.04); }
  .td-team { font-weight: 700; color: #fff; }
  .td-country { color: var(--muted); }

  .td-titles {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; color: var(--neon-yellow); letter-spacing: 0.05em;
  }

  .td-actions { white-space: nowrap; }

  .btn-edit, .btn-delete {
    border: none; border-radius: 6px;
    padding: 5px 10px; font-size: 0.75rem;
    font-weight: 700; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-right: 6px;
  }

  .btn-edit {
    background: rgba(0,207,255,0.15);
    color: var(--neon-blue);
    border: 1px solid rgba(0,207,255,0.3);
  }

  .btn-edit:hover {
    background: rgba(0,207,255,0.25);
    box-shadow: 0 4px 15px rgba(0,207,255,0.3);
    transform: translateY(-1px);
  }

  .btn-delete {
    background: rgba(255,77,109,0.15);
    color: var(--neon-red);
    border: 1px solid rgba(255,77,109,0.3);
  }

  .btn-delete:hover {
    background: rgba(255,77,109,0.25);
    box-shadow: 0 4px 15px rgba(255,77,109,0.3);
    transform: translateY(-1px);
  }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: #0a1628;
    border: 1px solid rgba(0,207,255,0.3);
    border-radius: 16px; padding: 32px;
    width: 90%; max-width: 420px;
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 40px rgba(0,207,255,0.1);
  }

  .modal-overlay.show .modal { transform: scale(1); }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 0.08em;
    color: var(--neon-blue); margin-bottom: 20px;
  }

  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }

  .modal-btns .btn-cancel {
    flex: 1; padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 0.1em;
    cursor: pointer; transition: background 0.2s;
  }

  .modal-btns .btn-cancel:hover { background: rgba(255,255,255,0.1); }

  .modal-btns .btn-save {
    flex: 2; padding: 12px;
    background: linear-gradient(135deg, var(--neon-blue), #0095cc);
    border: none; border-radius: 10px;
    color: #050a0e; font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 0.1em;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  }

  .modal-btns .btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,207,255,0.4);
  }

  .empty-state {
    text-align: center; padding: 40px;
    color: var(--muted); font-size: 0.9rem;
  }

  .empty-state span { display: block; font-size: 2rem; margin-bottom: 10px; }
  .row-new { animation: rowSlideIn 0.5s ease forwards; }

  @keyframes rowSlideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .row-delete { animation: rowFadeOut 0.4s ease forwards; }

  @keyframes rowFadeOut {
    to { opacity: 0; transform: translateX(20px); }
  }

  .confetti-piece {
    position: fixed; width: 10px; height: 10px;
    top: -20px; border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 9999; pointer-events: none;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, #0a1628, #0f2040);
    border: 1px solid var(--neon-green);
    border-radius: 12px; padding: 14px 28px;
    font-size: 0.9rem; font-weight: 600;
    color: var(--neon-green);
    box-shadow: 0 10px 40px rgba(0,255,136,0.3);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 9998; white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .neon-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-green), var(--neon-blue), transparent);
    margin: 8px 0 20px; opacity: 0.4;
  }

  .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; }

  .stat-chip {
    flex: 1;
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.1);
    border-radius: 10px; padding: 14px; text-align: center;
  }

  .stat-chip .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; color: var(--neon-green); line-height: 1;
  }

  .stat-chip .label {
    font-size: 0.65rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-top: 4px;
  }
</style>
</head>
<body>

<div class="stadium-lines"></div>

<div class="ball-container">
  <div class="floating-ball">⚽</div>
  <div class="floating-ball">⚽</div>
  <div class="floating-ball">⚽</div>
  <div class="floating-ball">⚽</div>
</div>

<div class="wrapper">
  <div class="header">
    <div class="header-badge">⚡ MongoDB Atlas · Live</div>
    <h1>Fútbol<br>Data</h1>
    <p>Sistema de registro de equipos · Base de datos en la nube</p>
  </div>

  <div class="stats-bar">
    <div class="stat-chip">
      <div class="num" id="totalEquipos">0</div>
      <div class="label">Equipos</div>
    </div>
    <div class="stat-chip">
      <div class="num" id="totalTitulos">0</div>
      <div class="label">Títulos</div>
    </div>
    <div class="stat-chip">
      <div class="num" id="totalPaises">0</div>
      <div class="label">Países</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">⚽ Registrar Equipo</div>
    <div class="neon-line"></div>
    <form id="formEquipo">
      <div class="form-group">
        <label>Nombre del equipo</label>
        <input type="text" id="nombre" placeholder="Ej: Real Madrid" required>
      </div>
      <div class="form-group">
        <label>País de origen</label>
        <input type="text" id="pais" placeholder="Ej: España" required>
      </div>
      <div class="form-group">
        <label>Número de títulos</label>
        <input type="number" id="titulos" placeholder="Ej: 15" required min="0">
      </div>
      <button type="submit" class="btn" id="btnSubmit">🏆 Guardar en la Nube</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">🏟️ Equipos Registrados</div>
    <div class="neon-line"></div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th>País</th>
            <th>Títulos</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla">
          <tr><td colspan="4"><div class="empty-state"><span>⚽</span>Cargando equipos...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">✏️ Editar Equipo</div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Nombre del equipo</label>
      <input type="text" id="editNombre" placeholder="Nombre del equipo">
    </div>
    <div class="form-group">
      <label>País de origen</label>
      <input type="text" id="editPais" placeholder="País">
    </div>
    <div class="form-group">
      <label>Número de títulos</label>
      <input type="number" id="editTitulos" placeholder="Títulos" min="0">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarEdicion()">💾 Guardar Cambios</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://futbol-backend-3hkl.onrender.com/equipos";

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--neon-green)';
  t.style.color = color || 'var(--neon-green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function launchConfetti() {
  const colors = ['#00ff88','#00cfff','#ffe600','#ff6b6b','#ffffff'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 10 + 5) + 'px';
    piece.style.height = (Math.random() * 10 + 5) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3500);
  }
}

function updateStats(datos) {
  document.getElementById('totalEquipos').textContent = datos.length;
  document.getElementById('totalTitulos').textContent = datos.reduce((s,e) => s + (e.titulos||0), 0);
  document.getElementById('totalPaises').textContent = new Set(datos.map(e => e.pais)).size;
}

async function obtenerEquipos() {
  try {
    const res = await fetch(API_URL);
    const datos = await res.json();
    const tabla = document.getElementById("tabla");
    tabla.innerHTML = "";
    if (datos.length === 0) {
      tabla.innerHTML = `<tr><td colspan="4"><div class="empty-state"><span>⚽</span>Aún no hay equipos registrados.</div></td></tr>`;
    } else {
      datos.forEach((eq, i) => {
        const tr = document.createElement('tr');
        tr.className = 'row-new';
        tr.style.animationDelay = (i * 0.06) + 's';
        tr.id = 'row-' + eq._id;
        tr.innerHTML = `
          <td class="td-team">${eq.nombre}</td>
          <td class="td-country">${eq.pais}</td>
          <td class="td-titles">🏆 ${eq.titulos}</td>
          <td class="td-actions">
            <button class="btn-edit" onclick="abrirEditar('${eq._id}','${eq.nombre}','${eq.pais}',${eq.titulos})">✏️ Editar</button>
            <button class="btn-delete" onclick="eliminarEquipo('${eq._id}')">🗑️ Eliminar</button>
          </td>`;
        tabla.appendChild(tr);
      });
    }
    updateStats(datos);
  } catch(err) {
    document.getElementById('tabla').innerHTML = `<tr><td colspan="4"><div class="empty-state"><span>⚠️</span>Error al cargar datos.</div></td></tr>`;
  }
}

document.getElementById('formEquipo').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnSubmit');
  btn.textContent = '⏳ Guardando...';
  btn.disabled = true;

  const nuevoEquipo = {
    nombre: document.getElementById("nombre").value,
    pais: document.getElementById("pais").value,
    titulos: Number(document.getElementById("titulos").value)
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(nuevoEquipo)
    });
    if (res.ok) {
      launchConfetti();
      showToast('🏆 ¡' + nuevoEquipo.nombre + ' guardado en Atlas!');
      document.getElementById('formEquipo').reset();
      await obtenerEquipos();
    }
  } catch(err) {
    showToast('❌ Error al guardar.', 'var(--neon-red)');
  }

  btn.textContent = '🏆 Guardar en la Nube';
  btn.disabled = false;
});

async function eliminarEquipo(id) {
  if (!confirm('¿Seguro que quieres eliminar este equipo?')) return;
  try {
    const row = document.getElementById('row-' + id);
    if (row) row.classList.add('row-delete');
    await new Promise(r => setTimeout(r, 400));
    const res = await fetch(API_URL + '/' + id, { method: 'DELETE' });
    if (res.ok) {
      showToast('🗑️ Equipo eliminado', 'var(--neon-red)');
      await obtenerEquipos();
    }
  } catch(err) {
    showToast('❌ Error al eliminar.', 'var(--neon-red)');
  }
}

function abrirEditar(id, nombre, pais, titulos) {
  document.getElementById('editId').value = id;
  document.getElementById('editNombre').value = nombre;
  document.getElementById('editPais').value = pais;
  document.getElementById('editTitulos').value = titulos;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

async function guardarEdicion() {
  const id = document.getElementById('editId').value;
  const datos = {
    nombre: document.getElementById('editNombre').value,
    pais: document.getElementById('editPais').value,
    titulos: Number(document.getElementById('editTitulos').value)
  };
  try {
    const res = await fetch(API_URL + '/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(datos)
    });
    if (res.ok) {
      closeModal();
      showToast('✅ ¡Equipo actualizado!', 'var(--neon-blue)');
      await obtenerEquipos();
    }
  } catch(err) {
    showToast('❌ Error al actualizar.', 'var(--neon-red)');
  }
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

obtenerEquipos();
</script>
</body>
</html>
